[Partition]
Type=usr
# Label=_empty (NOT %M_%A, and NOT CopyBlocks-cloned): the B slot must be an
# EMPTY sysupdate target at install time. If B were cloned + labeled %M_%A like
# A, both slots carry the SAME version == the running (ProtectVersion=%A)
# version, so the first `miz -Iu` has NO freeable slot -> "Version '<v>' is
# protected, not removing" -> "No available partition of a suitable size found".
# _empty is sysupdate's canonical free slot (sysupdate.d(5)); the first update
# writes the new /usr here and labels it archetype_<newversion>. Tradeoff: B is
# not a bootable clone until that first update -- acceptable, boot always uses A
# (selected by usrhash), and gpt-auto ignores _empty slots.
Label=_empty
SizeMinBytes=1G
SizeMaxBytes=1G
Verity=data
VerityMatchKey=usr-b
