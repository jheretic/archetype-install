[Partition]
Type=usr
Label=%M_%A
# 1G (not the ~512M current /usr) for update headroom: /usr is built
# Minimize=best (variable) and grows, and `miz -Iu` writes a whole new /usr
# image into the OTHER slot, which must be able to hold a larger-than-current
# image (a slot sized to today's clone caused the update out-of-space). With
# CopyBlocks, repart sizes the partition to max(source-size, SizeMinBytes), so
# the clone fits now and a bigger image fits later; the tail is unused space.
SizeMinBytes=1G
SizeMaxBytes=1G
Verity=data
VerityMatchKey=usr
# Clone the running system's verity /usr block-for-block (self-install), NOT
# Format= an empty squashfs. CopyBlocks and Format are mutually exclusive.
CopyBlocks=auto
