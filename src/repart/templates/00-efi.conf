[Partition]
Type=esp
# Stable PARTLABEL so the installed system can mount the ESP by label in
# /etc/fstab (installer esp_fstab_line). Without a mounted ESP, sysupdate's UKI
# transfer (90-uki.transfer, PathRelativeTo=esp) can't resolve the ESP and fails
# with "Required key not available" -> no host target -> `miz -I` "no such
# component: host". gpt-auto's ESP automount is conditional (LoaderDevicePartUUID
# + an empty /efi|/boot) and does not fire here, so we mount it explicitly.
Label=archetype-esp
SizeMinBytes=550M
SizeMaxBytes=550M
Format=vfat
