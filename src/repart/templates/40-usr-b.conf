[Partition]
Type=usr
Label=%M_%A
# 1G to match the A slot (10-usr) -- this is the slot `miz -Iu` writes the next
# /usr image into, so it must hold a larger-than-current image. See 10-usr.conf.
SizeMinBytes=1G
SizeMaxBytes=1G
Verity=data
VerityMatchKey=usr-b
# Mirror of the A slot (10-usr): clone the running /usr block-for-block so the
# installed system can boot from either slot immediately. The A/B updater
# overwrites this on the first image update.
CopyBlocks=auto
