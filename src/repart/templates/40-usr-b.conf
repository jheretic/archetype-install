[Partition]
Type=usr
Label=%M_%A
SizeMinBytes=512M
SizeMaxBytes=512M
Verity=data
VerityMatchKey=usr-b
# Mirror of the A slot (10-usr): clone the running /usr block-for-block so the
# installed system can boot from either slot immediately. The A/B updater
# overwrites this on the first image update.
CopyBlocks=auto
