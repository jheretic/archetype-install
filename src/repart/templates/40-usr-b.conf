[Partition]
Type=usr
# Label=archetype_1970.01.01-1 (a valid but ancient dummy version), NOT
# CopyBlocks-cloned. The B slot must be a sysupdate OVERWRITE target at install.
# A _empty label does NOT work: sysupdate only considers /usr partitions whose
# label matches the transfer MatchPattern=archetype_@v as candidate slots, and
# _empty doesn't match -> "No available partition of a suitable size found".
# And cloning B + labeling it %M_%A like A gives both slots the SAME version ==
# the running (ProtectVersion=%A-protected) version -> no freeable slot -> the
# same failure. A matching-but-oldest version fixes both: it matches @v, and
# sorts older than any real version (1970 << 20xx) so it is never %A and is
# always the overwrite target. First `miz -Iu` writes the new /usr here + labels
# it archetype_<newversion>. Not cloned/bootable (its ancient label never wins
# gpt-auto's newest-version pick); boot always uses A (via usrhash) until then.
Label=archetype_1970.01.01-1
SizeMinBytes=1G
SizeMaxBytes=1G
Verity=data
VerityMatchKey=usr-b
